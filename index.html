<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rosario Inmobiliaria - Ficha de Propiedad</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: #fafaf9; }
/* Lightbox */
#lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; flex-direction:row; }
#lightbox img { max-width:92vw; max-height:88vh; object-fit:contain; border-radius:4px; }
#lightbox .lb-prev, #lightbox .lb-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:50%; width:48px; height:48px; font-size:26px; cursor:pointer; line-height:48px; text-align:center; padding:0; }
#lightbox .lb-prev { left:16px; }
#lightbox .lb-next { right:16px; }
#lightbox .lb-close { position:absolute; top:16px; right:20px; background:none; border:none; color:#fff; font-size:32px; cursor:pointer; line-height:1; }
#lightbox .lb-counter { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.7); font-size:13px; }
#loading { display:flex; align-items:center; justify-content:center; height:100vh; font-size:18px; color:#888; }
#app { display:none; max-width:900px; margin:0 auto; padding:2rem 1.5rem; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; padding-bottom:1rem; border-bottom:0.5px solid #e5e5e5; }
.logo { height:52px; width:auto; object-fit:contain; }
.badge { display:inline-block; font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:4px 10px; border-radius:4px; background:#A8272A; color:#fff; }
.galeria { position:relative; border-radius:12px; overflow:hidden; aspect-ratio:16/8; background:#7a1a1c; margin-bottom:4px; }
.galeria img { width:100%; height:100%; object-fit:cover; display:block; }
.btn-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50%; width:38px; height:38px; font-size:22px; cursor:pointer; line-height:38px; text-align:center; padding:0; }
.btn-nav.prev { left:10px; }
.btn-nav.next { right:10px; }
.counter { position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,0.55); color:#fff; font-size:12px; padding:4px 10px; border-radius:20px; }
.thumbs { display:flex; gap:4px; margin-bottom:1.5rem; }
.thumb { flex:1; aspect-ratio:16/10; border-radius:4px; overflow:hidden; cursor:pointer; border:0.5px solid #ddd; }
.thumb.active { border:2px solid #A8272A; }
.thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.layout { display:grid; grid-template-columns:1fr 290px; gap:1.5rem; align-items:start; }
.precio-box { padding:1rem 1.25rem; background:#f7f7f7; border-radius:12px; border:0.5px solid #eee; margin-bottom:1.25rem; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:1.25rem; }
.stat { padding:12px 8px; background:#f7f7f7; border-radius:8px; text-align:center; border:0.5px solid #eee; }
.caract-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; margin-bottom:1.5rem; }
.caract-item { display:flex; align-items:center; gap:8px; font-size:13px; padding:8px 10px; background:#f7f7f7; border-radius:6px; }
.dot { width:6px; height:6px; border-radius:50%; background:#A8272A; flex-shrink:0; }
.sidebar-card { background:#fff; border:0.5px solid #eee; border-radius:12px; padding:1.25rem; position:sticky; top:1rem; }
.btn-primary { display:block; width:100%; padding:11px; background:#A8272A; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; margin-bottom:8px; text-align:center; text-decoration:none; }
.btn-wsp { background:transparent; color:#A8272A; border:0.5px solid #A8272A; text-align:center; display:block; width:100%; padding:11px; border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif; cursor:pointer; margin-bottom:8px; text-decoration:none; }
.seccion { font-family:'Playfair Display',serif; font-size:16px; font-weight:500; margin-bottom:1rem; padding-bottom:8px; border-bottom:0.5px solid #eee; }
table.detalles { width:100%; font-size:13px; border-collapse:collapse; margin-bottom:1.5rem; }
table.detalles tr { border-bottom:0.5px solid #eee; }
table.detalles tr:last-child { border-bottom:none; }
table.detalles td { padding:8px 4px; }
table.detalles td:first-child { color:#888; width:50%; }
.nota { font-size:11px; color:#aaa; line-height:1.5; margin-top:1rem; padding-top:1rem; border-bottom:0.5px solid #eee; }
@media (max-width:700px) {
  .layout { grid-template-columns:1fr; }
  .stats { grid-template-columns:repeat(2,1fr); }
  .caract-grid { grid-template-columns:1fr; }
  .sidebar { order:-1; }
}
</style>
</head>
<body>

<div id="loading">Cargando ficha...</div>
<div id="app"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" onclick="lbCerrar()">&#x2715;</button>
  <button class="lb-prev" onclick="lbCambiar(_lbIdx-1)">&#8249;</button>
  <img id="lb-img" src="" />
  <button class="lb-next" onclick="lbCambiar(_lbIdx+1)">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
const JSONBIN_KEY = '$2a$10$fkPEWzfTALriuCYyeBvuvO0go4Uc13O/HWwhVaOAIohPjwCov7LQ.';
const LOGO_URL = 'https://rosario-fichas.netlify.app/logo.png';

// Leer ID de la URL
const params = new URLSearchParams(window.location.search);
const binId = params.get('id');

if (!binId) {
  document.getElementById('loading').textContent = 'Error: no se especificó ID de ficha.';
} else {
  fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false' }
  })
  .then(r => r.json())
  .then(datos => {
    document.getElementById('loading').style.display = 'none';
    renderFicha(datos);
    document.getElementById('app').style.display = 'block';
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'Error al cargar la ficha.';
  });
}

let _fi = 0;
let _fotos = [];

function cambiarFoto(idx) {
  const t = _fotos.length;
  if (!t) return;
  idx = ((idx % t) + t) % t;
  _fi = idx;
  document.getElementById('fp').src = _fotos[idx];
  document.getElementById('ctr').textContent = (idx+1) + ' / ' + t;
  document.querySelectorAll('.thumb').forEach((th, i) => {
    th.className = 'thumb' + (i === idx ? ' active' : '');
  });
}

document.addEventListener('keydown', e => {
  const lbOpen = document.getElementById('lightbox').style.display === 'flex';
  if (e.key === 'ArrowRight') lbOpen ? lbCambiar(_lbIdx+1) : cambiarFoto(_fi+1);
  if (e.key === 'ArrowLeft') lbOpen ? lbCambiar(_lbIdx-1) : cambiarFoto(_fi-1);
  if (e.key === 'Escape') lbCerrar();
});

// Lightbox
let _lbIdx = 0;
let _lbFotos = [];

function lbAbrir(idx) {
  _lbFotos = _fotos;
  _lbIdx = idx;
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  lbMostrar();
}

function lbCambiar(idx) {
  const t = _lbFotos.length;
  _lbIdx = ((idx % t) + t) % t;
  lbMostrar();
}

function lbMostrar() {
  document.getElementById('lb-img').src = _lbFotos[_lbIdx];
  document.getElementById('lb-counter').textContent = (_lbIdx+1) + ' / ' + _lbFotos.length;
}

function lbCerrar() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}

// Cerrar al hacer clic fuera de la imagen
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) lbCerrar();
});

function renderFicha(d) {
  _fotos = d.fotos || [];
  const f = d.features || {};
  const sup = f.supTotal || f.supCubierta || f.superficie || '';
  const dorms = f.dormitorios || '';
  const amb = f.ambientes || '';
  const banos = f.banos || '';
  const antig = f.antiguedad || '';
  const caract = (d.caracteristicas || []).filter(c => c.length > 1);

  // Limpiar descripción en el lado del viewer también
  function limpiarDesc(texto) {
    if (!texto) return '';
    const cortes = ['leer menos', 'leer más', 'avisarme si baja', 'zonaprop crm', 
                    'propiedades similares', 'también te puede'];
    let t = texto;
    for (const c of cortes) {
      const idx = t.toLowerCase().indexOf(c);
      if (idx > 0) t = t.substring(0, idx);
    }
    // Eliminar líneas con basura
    const malas = ['leer menos','leer más','avisarme','operación','venta','tipo','departamento',
                   'código','detalles','compartir','guardar','denunciar'];
    return t.split('\n')
      .filter(l => {
        const ll = l.trim().toLowerCase();
        if (!ll) return false;
        return !malas.some(m => ll === m || (ll.startsWith(m) && ll.length < m.length + 15));
      })
      .join('\n').trim();
  }
  d.descripcion = limpiarDesc(d.descripcion);

  const supCubierta = f.supCubierta || '';
  const statsData = [
    { val: f.supTotal || sup, label: 'Sup. total' },
    { val: supCubierta, label: 'Sup. cubierta' },
    { val: amb, label: 'Ambientes' },
    { val: dorms, label: 'Dormitorios' },
    { val: banos, label: 'Baños' },
  ].filter(s => s.val);

  // Galería
  let galeriaHTML = '';
  if (_fotos.length > 0) {
    const thumbsHTML = _fotos.slice(0, 6).map((f, i) =>
      `<div class="thumb${i===0?' active':''}" onclick="cambiarFoto(${i})" ondblclick="lbAbrir(${i})" style="cursor:pointer;">
        <img src="${f}" onerror="this.style.display='none'" />
      </div>`
    ).join('');
    galeriaHTML = `
      <div class="galeria">
        <img id="fp" src="${_fotos[0]}" style="cursor:zoom-in;" onclick="lbAbrir(_fi)" />
        <button class="btn-nav prev" onclick="cambiarFoto(_fi-1)">&#8249;</button>
        <button class="btn-nav next" onclick="cambiarFoto(_fi+1)">&#8250;</button>
        <div id="ctr" class="counter">1 / ${_fotos.length}</div>
      </div>
      <div class="thumbs">${thumbsHTML}</div>`;
  } else {
    galeriaHTML = `<div class="galeria" style="display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:14px;">Sin fotos</div><div style="margin-bottom:1.5rem;"></div>`;
  }

  const statsHTML = statsData.map(s => `
    <div class="stat">
      <div style="font-size:17px;font-weight:500;margin-bottom:2px;">${s.val}</div>
      <div style="font-size:11px;color:#888;">${s.label}</div>
    </div>`).join('');

  // Características no se muestran (datos mezclados con sugeridos de ZonaProp)
  const caractHTML = '';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div style="display:flex;align-items:center;gap:12px;">
        <img class="logo" src="${LOGO_URL}" onerror="this.style.display='none'" />
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:500;">Rosario Inmobiliaria</div>
          <div style="font-size:11px;color:#888;letter-spacing:0.1em;text-transform:uppercase;">Propiedades en Rosario</div>
        </div>
      </div>
      <span class="badge">En Venta</span>
    </div>

    ${galeriaHTML}

    <div class="layout">
      <div>
        <div style="margin-bottom:1.25rem;">
          <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:500;line-height:1.2;margin-bottom:8px;color:#1a1a1a;">${d.direccion || d.titulo || 'Propiedad en venta'}</div>
          <div style="font-size:14px;color:#666;margin-bottom:4px;">${d.titulo || ''}</div>
          <div style="font-size:12px;color:#888;">Rosario, Santa Fe</div>
        </div>

        <div class="precio-box">
          <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-bottom:4px;">Precio de venta</div>
          <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:500;">${d.precio || '–'}</div>
          ${d.expensas ? `<div style="font-size:13px;color:#888;margin-top:4px;">Expensas: ${d.expensas}</div>` : ''}
        </div>

        ${statsData.length ? `<div class="stats">${statsHTML}</div>` : ''}

        <div class="seccion">Descripción</div>
        <div style="font-size:14px;line-height:1.75;color:#555;margin-bottom:1.5rem;">${(d.descripcion||'').replace(/\n/g,'<br>')}</div>

        <!-- Características eliminadas - datos poco confiables de ZonaProp -->

        <div class="seccion">Detalles</div>
        <table class="detalles">
          ${antig ? `<tr><td>Antigüedad</td><td>${antig}</td></tr>` : ''}
          ${f.extra ? `<tr><td>Estado</td><td>${f.extra}</td></tr>` : ''}
          <tr><td>Operación</td><td>Venta</td></tr>
          <tr><td>Código</td><td>${d.codigo || ''}</td></tr>
        </table>

        <p class="nota">* Las superficies y medidas son aproximadas y a solo efecto orientativo.</p>
      </div>

      <div class="sidebar">
        <div class="sidebar-card">
          <div style="font-size:13px;font-weight:500;margin-bottom:10px;">¿Te interesa esta propiedad?</div>
          <a href="https://wa.me/5493413436861?text=Hola%2C+me+interesa+la+propiedad+${encodeURIComponent(d.titulo||'')}" target="_blank" class="btn-wsp">WhatsApp</a>
          <a href="tel:+5493413436861" class="btn-primary">Llamar</a>
          <div style="text-align:center;font-size:11px;color:#bbb;margin-top:8px;letter-spacing:0.06em;">COD · ${d.codigo || ''}</div>
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
